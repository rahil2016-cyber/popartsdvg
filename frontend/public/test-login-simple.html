
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test Login</title>
  <style>
    body { padding: 2rem; font-family: sans-serif; max-width: 500px; margin: 0 auto; }
    label { display: block; margin: 1rem 0 0.25rem; }
    input { width: 100%; padding: 0.75rem; margin-bottom: 0.5rem; font-size: 1rem; border: 1px solid #ddd; border-radius: 0.5rem; }
    button { width: 100%; padding: 1rem; margin-top: 1rem; background: linear-gradient(to right, #7c3aed, #db2777); color: white; font-size: 1rem; border: none; border-radius: 0.5rem; cursor: pointer; }
    button:hover { opacity: 0.9; }
    #result { margin-top: 2rem; padding: 1rem; background: #f0f0f0; border-radius: 0.5rem; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>Test Admin Login</h1>
  <form id="loginForm">
    <label>Email</label>
    <input type="email" id="email" value="admin@popartsdvg.com">
    <label>Password</label>
    <input type="password" id="password" value="admin123">
    <button type="submit">Login</button>
  </form>
  <div id="result"></div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const resultDiv = document.getElementById('result');
      resultDiv.textContent = 'Sending request...';
      
      try {
        const response = await fetch('http://127.0.0.1:5000/api/auth/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        });
        
        const data = await response.json();
        resultDiv.textContent = JSON.stringify({
          status: response.status,
          data
        }, null, 2);
        
        if (response.ok) {
          alert('Login successful! Check the result below!');
        } else {
          alert('Login failed! Check the error!');
        }
      } catch (error) {
        resultDiv.textContent = 'Error: ' + error.message;
      }
    });
  </script>
</body>
</html>
